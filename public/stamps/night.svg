<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" width="120" height="140">
  <!-- Stamp border -->
  <rect x="2" y="2" width="116" height="136" rx="4" ry="4" fill="#fff9f0" stroke="#c4a882" stroke-width="2"/>
  <line x1="2" y1="12" x2="118" y2="12" stroke="#c4a882" stroke-width="0.5" stroke-dasharray="4,3"/>
  <line x1="2" y1="128" x2="118" y2="128" stroke="#c4a882" stroke-width="0.5" stroke-dasharray="4,3"/>
  <line x1="12" y1="2" x2="12" y2="138" stroke="#c4a882" stroke-width="0.5" stroke-dasharray="4,3"/>
  <line x1="108" y1="2" x2="108" y2="138" stroke="#c4a882" stroke-width="0.5" stroke-dasharray="4,3"/>

  <!-- Night sky -->
  <rect x="13" y="13" width="94" height="100" rx="2" fill="#1a237e"/>
  <!-- Stars -->
  <circle cx="25" cy="22" r="1" fill="white" opacity="0.9"/>
  <circle cx="40" cy="18" r="1.2" fill="white"/>
  <circle cx="55" cy="25" r="0.8" fill="white" opacity="0.8"/>
  <circle cx="70" cy="17" r="1" fill="white"/>
  <circle cx="85" cy="22" r="1.2" fill="white" opacity="0.9"/>
  <circle cx="95" cy="30" r="0.8" fill="white" opacity="0.7"/>
  <circle cx="30" cy="35" r="0.8" fill="white" opacity="0.8"/>
  <circle cx="100" cy="18" r="1" fill="white"/>
  <circle cx="18" cy="40" r="0.9" fill="white" opacity="0.8"/>
  <circle cx="48" cy="38" r="0.7" fill="white" opacity="0.6"/>
  <!-- Shooting star -->
  <line x1="62" y1="20" x2="75" y2="28" stroke="white" stroke-width="1" opacity="0.7"/>
  <circle cx="62" cy="20" r="1.2" fill="white"/>

  <!-- Moon -->
  <circle cx="88" cy="32" r="10" fill="#fff176"/>
  <circle cx="93" cy="28" r="9" fill="#1a237e"/>

  <!-- Rolling hills silhouette -->
  <ellipse cx="30" cy="95" rx="30" ry="18" fill="#283593"/>
  <ellipse cx="75" cy="98" rx="35" ry="16" fill="#1565c0"/>
  <ellipse cx="60" cy="100" rx="50" ry="12" fill="#283593"/>

  <!-- Trees silhouette -->
  <polygon points="25,85 28,65 31,85" fill="#0d1b6e"/>
  <polygon points="88,80 92,58 96,80" fill="#0d1b6e"/>
  <polygon points="100,85 104,67 108,85" fill="#0d1b6e"/>

  <!-- Candlelight / lanterns -->
  <circle cx="60" cy="75" r="6" fill="#ffee58" opacity="0.3"/>
  <circle cx="60" cy="75" r="3" fill="#ffd54f" opacity="0.6"/>
  <rect x="58" y="75" width="4" height="8" fill="#ff8f00" rx="1"/>
  <!-- Glow -->
  <circle cx="60" cy="74" r="8" fill="#ffee58" opacity="0.15"/>

  <!-- Hearts in sky -->
  <text x="43" y="55" font-size="7" fill="#f48fb1" opacity="0.8">♥</text>
  <text x="70" y="50" font-size="6" fill="#f06292" opacity="0.7">♥</text>

  <!-- Ground -->
  <rect x="13" y="108" width="94" height="5" fill="#1b5e20"/>

  <!-- Label -->
  <rect x="13" y="113" width="94" height="15" rx="1" fill="#1a237e"/>
  <text x="60" y="124" text-anchor="middle" font-family="serif" font-size="6" fill="#e8eaf6" font-weight="bold">NUIT ROMANTIQUE</text>
</svg>
