  <path d="M60,56 L56.5,52.5 C55.5,51.5 55.5,50 56.5,49 C57.5,48 59,48 60,49 C61,48 62.5,48 63.5,49 C64.5,50 64.5,51.5 63.5,52.5 Z" fill="#e91e63"/>
