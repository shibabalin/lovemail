<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>LoveMail</title>
  <script>
    // GitHub Pages SPA redirect hack
    var path = window.location.pathname;
    var base = '/lovemail';
    var rest = path.replace(base, '');
    var search = window.location.search;
    var hash = window.location.hash;
    var redirect = base + '/?p=' + encodeURIComponent(rest + search) + hash;
    window.location.replace(redirect);
  </script>
</head>
<body>Redirection...</body>
</html>
