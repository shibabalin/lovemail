  <ellipse cx="35" cy="27" rx="8" ry="4" fill="#e91e63" opacity="0.25"/>
  <ellipse cx="85" cy="35" rx="10" ry="4.5" fill="#ff6d00" opacity="0.3"/>
  <ellipse cx="93" cy="32" rx="7" ry="3.5" fill="#e91e63" opacity="0.2"/>
  <ellipse cx="55" cy="22" rx="9" ry="4" fill="#ab47bc" opacity="0.3"/>
  <!-- Silhouette côtière -->
  <path d="M10 85 Q20 78 30 82 Q40 85 50 80 Q55 78 60 86 Q65 78 70 80 Q80 85 90 79 Q100 75 110 82 L110 110 L10 110 Z" fill="#0d1b3e" opacity="0.7"/>
  <!-- Palmier gauche -->
  <path d="M25 110 Q26 95 28 85" stroke="#1b3a0f" stroke-width="2" fill="none"/>
  <ellipse cx="28" cy="85" rx="8" ry="4" fill="#2e7d32" transform="rotate(-30,28,85)"/>
  <ellipse cx="24" cy="83" rx="7" ry="3.5" fill="#388e3c" transform="rotate(20,24,83)"/>
  <ellipse cx="32" cy="82" rx="7" ry="3.5" fill="#2e7d32" transform="rotate(-50,32,82)"/>
  <!-- Palmier droit -->
  <path d="M95 110 Q94 93 92 83" stroke="#1b3a0f" stroke-width="2" fill="none"/>
  <ellipse cx="92" cy="83" rx="8" ry="4" fill="#2e7d32" transform="rotate(30,92,83)"/>
  <ellipse cx="96" cy="81" rx="7" ry="3.5" fill="#388e3c" transform="rotate(-20,96,81)"/>
  <ellipse cx="88" cy="80" rx="7" ry="3.5" fill="#2e7d32" transform="rotate(50,88,80)"/>
  <!-- Silhouettes couple -->
  <g fill="#0d1b3e" transform="translate(56,100)">
    <circle cx="-4" cy="-8" r="2.5"/>
    <rect x="-6" y="-5" width="5" height="8" rx="1"/>
    <circle cx="4" cy="-8" r="2.5"/>
    <rect x="1" y="-5" width="5" height="8" rx="1"/>
    <!-- Mains -->
    <line x1="-1" y1="-2" x2="1" y2="-2" stroke="#0d1b3e" stroke-width="1.5"/>
  </g>
  <!-- Label -->
  <rect x="10" y="118" width="100" height="24" rx="3" fill="#e64a19" opacity="0.9"/>
  <text x="60" y="134" text-anchor="middle" font-family="Georgia,serif" font-size="9.5" fill="white" font-weight="bold" letter-spacing="1">COUCHER DE SOLEIL</text>
