    <line x1="72" y1="70" x2="75" y2="67"/>
    <line x1="78" y1="80" x2="83" y2="78"/>
    <line x1="48" y1="70" x2="45" y2="67"/>
    <line x1="42" y1="80" x2="37" y2="78"/>
    <line x1="76" y1="92" x2="81" y2="92"/>
    <line x1="44" y1="92" x2="39" y2="92"/>
  </g>
  <!-- Nuages -->
