    <circle cx="114" cy="10" r="3.5"/><circle cx="114" cy="20" r="3.5"/><circle cx="114" cy="30" r="3.5"/><circle cx="114" cy="40" r="3.5"/><circle cx="114" cy="50" r="3.5"/><circle cx="114" cy="60" r="3.5"/><circle cx="114" cy="70" r="3.5"/><circle cx="114" cy="80" r="3.5"/><circle cx="114" cy="90" r="3.5"/><circle cx="114" cy="100" r="3.5"/><circle cx="114" cy="110" r="3.5"/><circle cx="114" cy="120" r="3.5"/><circle cx="114" cy="130" r="3.5"/><circle cx="114" cy="140" r="3.5"/>
    <circle cx="20" cy="5" r="3.5"/><circle cx="30" cy="5" r="3.5"/><circle cx="40" cy="5" r="3.5"/><circle cx="50" cy="5" r="3.5"/><circle cx="60" cy="5" r="3.5"/><circle cx="70" cy="5" r="3.5"/><circle cx="80" cy="5" r="3.5"/><circle cx="90" cy="5" r="3.5"/><circle cx="100" cy="5" r="3.5"/>
    <circle cx="20" cy="145" r="3.5"/><circle cx="30" cy="145" r="3.5"/><circle cx="40" cy="145" r="3.5"/><circle cx="50" cy="145" r="3.5"/><circle cx="60" cy="145" r="3.5"/><circle cx="70" cy="145" r="3.5"/><circle cx="80" cy="145" r="3.5"/><circle cx="90" cy="145" r="3.5"/><circle cx="100" cy="145" r="3.5"/>
  </g>
  <defs>
    <linearGradient id="sunsetsky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0533"/>
      <stop offset="30%" stop-color="#7b1fa2"/>
      <stop offset="60%" stop-color="#e64a19"/>
      <stop offset="80%" stop-color="#ff8f00"/>
      <stop offset="100%" stop-color="#ffd54f"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1565c0"/>
      <stop offset="100%" stop-color="#0d47a1"/>
    </linearGradient>
  </defs>
  <!-- Ciel coucher de soleil -->
  <rect x="10" y="10" width="100" height="80" rx="3" fill="url(#sunsetsky)"/>
  <!-- Mer -->
  <rect x="10" y="85" width="100" height="25" rx="0" fill="url(#sea)"/>
  <!-- Reflets soleil sur mer -->
  <ellipse cx="60" cy="90" rx="20" ry="3" fill="#ff8f00" opacity="0.4"/>
  <ellipse cx="60" cy="95" rx="10" ry="2" fill="#ff8f00" opacity="0.3"/>
  <ellipse cx="60" cy="100" rx="5" ry="1.5" fill="#ff8f00" opacity="0.2"/>
  <!-- Soleil couchant -->
  <circle cx="60" cy="86" r="14" fill="#ff8f00" opacity="0.95"/>
  <circle cx="60" cy="86" r="11" fill="#ffd54f" opacity="0.8"/>
  <!-- Rayons soleil -->
  <g stroke="#ff8f00" stroke-width="1.2" opacity="0.5">
