  <ellipse cx="42" cy="128" rx="10" ry="14" fill="#0a1540"/>
  <rect x="39" y="132" width="5" height="15" fill="#0a1540"/>
  <ellipse cx="120" cy="126" rx="10" ry="14" fill="#0a1540"/>
  <rect x="117" y="130" width="5" height="15" fill="#0a1540"/>

