  <!-- Dentelure bas -->
  <circle cx="8" cy="182" r="5.5" fill="white"/><circle cx="22" cy="186" r="5.5" fill="white"/><circle cx="36" cy="186" r="5.5" fill="white"/><circle cx="50" cy="186" r="5.5" fill="white"/><circle cx="64" cy="186" r="5.5" fill="white"/><circle cx="78" cy="186" r="5.5" fill="white"/><circle cx="92" cy="186" r="5.5" fill="white"/><circle cx="106" cy="186" r="5.5" fill="white"/><circle cx="120" cy="186" r="5.5" fill="white"/><circle cx="134" cy="186" r="5.5" fill="white"/><circle cx="148" cy="186" r="5.5" fill="white"/><circle cx="152" cy="182" r="5.5" fill="white"/>
  <!-- Dentelure gauche -->
