  <!-- Cratères lune visibles -->
  <circle cx="110" cy="32" r="2.5" fill="#fff9c4" opacity="0.4"/>
  <circle cx="115" cy="42" r="1.8" fill="#fff9c4" opacity="0.4"/>

  <!-- Silhouette ville / château -->
  <!-- Tour gauche -->
  <rect x="18" y="95" width="16" height="50" fill="#0d1b6e"/>
  <rect x="16" y="90" width="20" height="8" fill="#0d1b6e"/>
  <rect x="17" y="86" width="4" height="6" fill="#0d1b6e"/>
  <rect x="23" y="86" width="4" height="6" fill="#0d1b6e"/>
  <rect x="29" y="86" width="4" height="6" fill="#0d1b6e"/>
  <!-- Fenêtres tour gauche illuminées -->
  <rect x="22" y="100" width="5" height="7" rx="2" fill="#fff176" opacity="0.8"/>
  <rect x="22" y="114" width="5" height="7" rx="2" fill="#fff176" opacity="0.6"/>
  <rect x="22" y="128" width="5" height="7" rx="2" fill="#ffcc02" opacity="0.5"/>

