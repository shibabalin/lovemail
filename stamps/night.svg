  <!-- Porte -->
  <rect x="72" y="128" width="16" height="17" rx="3" fill="#fff176" opacity="0.4"/>

  <!-- Tour droite -->
  <rect x="126" y="98" width="14" height="47" fill="#0d1b6e"/>
  <rect x="124" y="92" width="18" height="8" fill="#0d1b6e"/>
  <rect x="125" y="88" width="4" height="6" fill="#0d1b6e"/>
  <rect x="131" y="88" width="4" height="6" fill="#0d1b6e"/>
  <rect x="137" y="88" width="4" height="6" fill="#0d1b6e"/>
  <rect x="129" y="103" width="5" height="7" rx="2" fill="#fff176" opacity="0.8"/>
  <rect x="129" y="117" width="5" height="7" rx="2" fill="#fff176" opacity="0.6"/>

