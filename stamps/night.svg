<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 190" width="160" height="190">
  <defs>
    <radialGradient id="nightsky" cx="50%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#283593"/>
      <stop offset="100%" stop-color="#0d1b6e"/>
    </radialGradient>
    <radialGradient id="moon" cx="40%" cy="40%" r="60%">
