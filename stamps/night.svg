  <!-- Fenêtres -->
  <rect x="62" y="88" width="8" height="10" rx="2" fill="#fff176" opacity="0.7"/>
  <rect x="90" y="88" width="8" height="10" rx="2" fill="#fff176" opacity="0.7"/>
  <rect x="62" y="105" width="8" height="10" rx="2" fill="#ffcc02" opacity="0.6"/>
  <rect x="90" y="105" width="8" height="10" rx="2" fill="#ffcc02" opacity="0.6"/>
