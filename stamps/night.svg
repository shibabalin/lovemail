  <!-- Coeurs dans le ciel -->
  <path d="M76 48 Q78 45 80 48 Q82 45 80 52 Q78 45 76 48Z" fill="#f48fb1" opacity="0.7"/>
  <path d="M86 58 Q87.5 56 89 58 Q90.5 56 89 61 Q87.5 56 86 58Z" fill="#f06292" opacity="0.5"/>

  <!-- Bandeau bas -->
  <rect x="15" y="148" width="130" height="30" rx="2" fill="#311b92"/>
  <text x="80" y="157" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#e8eaf6" font-weight="bold" letter-spacing="2">LOVEMAIL</text>
  <text x="80" y="170" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#ce93d8" font-weight="bold">♥ 1er</text>
