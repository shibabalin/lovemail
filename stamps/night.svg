  <circle cx="42" cy="19" r="1.5" fill="white"/>
  <circle cx="58" cy="28" r="1" fill="white" opacity="0.8"/>
  <circle cx="30" cy="38" r="0.8" fill="white" opacity="0.7"/>
  <circle cx="55" cy="40" r="1.2" fill="white"/>
  <circle cx="72" cy="22" r="1.5" fill="white" opacity="0.9"/>
  <circle cx="88" cy="30" r="0.9" fill="white" opacity="0.8"/>
  <circle cx="48" cy="50" r="0.8" fill="white" opacity="0.6"/>
  <circle cx="32" cy="58" r="1" fill="white" opacity="0.8"/>
  <circle cx="62" cy="55" r="0.7" fill="white" opacity="0.7"/>
