  <!-- Dentelure droite -->
  <circle cx="156" cy="22" r="5.5" fill="white"/><circle cx="156" cy="36" r="5.5" fill="white"/><circle cx="156" cy="50" r="5.5" fill="white"/><circle cx="156" cy="64" r="5.5" fill="white"/><circle cx="156" cy="78" r="5.5" fill="white"/><circle cx="156" cy="92" r="5.5" fill="white"/><circle cx="156" cy="106" r="5.5" fill="white"/><circle cx="156" cy="120" r="5.5" fill="white"/><circle cx="156" cy="134" r="5.5" fill="white"/><circle cx="156" cy="148" r="5.5" fill="white"/><circle cx="156" cy="162" r="5.5" fill="white"/>

