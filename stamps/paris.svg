<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 150">
  <rect width="120" height="150" rx="4" fill="#f0f4ff"/>
  <rect x="3" y="3" width="114" height="144" rx="2" fill="none" stroke="#4a6fa5" stroke-width="0.8" stroke-dasharray="3,2"/>
